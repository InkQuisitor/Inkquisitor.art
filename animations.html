<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InkQuisitor | Animations</title>

    <!-- Google Fonts: Inter (Body) and Caveat (Links/Accents) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Tailwind CSS v4 Browser Script for No-Build Setup -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>

    <!-- Tailwind Configuration (Theme) -->
    <style type="text/tailwindcss">
        @theme {
            --color-pale-yellow: #fef08a; /* Tailwind yellow-200 */
            --font-display: "Caveat", cursive;
            --font-body: "Inter", sans-serif;
        }
    </style>
</head>

<body
    class="bg-white text-zinc-900 font-body antialiased flex flex-col min-h-screen selection:bg-pale-yellow selection:text-black">

    <!-- Header / Navigation -->
    <header
        class="py-8 px-6 md:px-12 w-full max-w-5xl mx-auto flex flex-col md:flex-row justify-between items-center border-b-2 border-zinc-100">
        <a href="index.html" class="text-3xl font-bold tracking-tight mb-4 md:mb-0 hover:text-zinc-600 transition-colors">
            InkQuisitor.art
        </a>
        <nav>
            <ul class="flex space-x-8 text-xl font-display">
                <li><a href="art.html" class="nav-link relative hover:text-zinc-600 transition-colors">Art</a></li>
                <li><a href="animations.html" class="nav-link relative hover:text-zinc-600 transition-colors">Animations</a>
                </li>
                <li><a href="contact.html" class="nav-link relative hover:text-zinc-600 transition-colors">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="flex-grow w-full max-w-5xl mx-auto px-6 md:px-12 py-12">
        <!-- Animations Section -->
        <section id="animations" class="mb-24 animate-fade-in-up">
            <h2 class="text-3xl font-display mb-8 pb-2 border-b border-zinc-100 inline-block pr-8">Animations</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- Anim Item 1 -->
                <article
                    class="animation-card group relative aspect-video bg-zinc-100 rounded-lg overflow-hidden border border-zinc-200 shadow-sm hover:shadow-xl hover:scale-[1.03] transition-all duration-500 z-10 hover:z-20 cursor-pointer">
                    <video src="Portfolio/Allergy_.mp4" class="absolute inset-0 w-full h-full object-cover" loop muted playsinline></video>
                    
                    <!-- Play Button Overlay -->
                    <div class="play-overlay absolute inset-0 flex items-center justify-center bg-black/10 transition-opacity duration-300">
                        <div class="w-16 h-16 rounded-full bg-white/90 backdrop-blur-sm flex items-center justify-center shadow-lg group-hover:scale-110 transition-transform duration-300">
                            <div class="w-0 h-0 border-t-[10px] border-t-transparent border-l-[16px] border-l-black border-b-[10px] border-b-transparent ml-2"></div>
                        </div>
                    </div>
                    
                    <div
                        class="absolute inset-x-0 bottom-0 bg-white/90 backdrop-blur-sm p-4 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-out border-t border-zinc-100 z-20">
                        <h3 class="font-medium text-black">Animation Loop</h3>
                        <p class="text-sm text-zinc-500 mt-1">2D Frame-by-frame</p>
                    </div>
                </article>
                <!-- Anim Item 2 -->
                <article
                    class="animation-card group relative aspect-video bg-zinc-100 rounded-lg overflow-hidden border border-zinc-200 shadow-sm hover:shadow-xl hover:scale-[1.03] transition-all duration-500 z-10 hover:z-20 cursor-pointer">
                    <video src="Portfolio/DoomShroom_021426.mov" class="absolute inset-0 w-full h-full object-cover" loop muted playsinline></video>
                    
                    <!-- Play Button Overlay -->
                    <div class="play-overlay absolute inset-0 flex items-center justify-center bg-black/10 transition-opacity duration-300">
                        <div class="w-16 h-16 rounded-full bg-white/90 backdrop-blur-sm flex items-center justify-center shadow-lg group-hover:scale-110 transition-transform duration-300">
                            <div class="w-0 h-0 border-t-[10px] border-t-transparent border-l-[16px] border-l-black border-b-[10px] border-b-transparent ml-2"></div>
                        </div>
                    </div>

                    <div
                        class="absolute inset-x-0 bottom-0 bg-white/90 backdrop-blur-sm p-4 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-out border-t border-zinc-100 z-20">
                        <h3 class="font-medium text-black">2-D Animation</h3>
                        <p class="text-sm text-zinc-500 mt-1">Rigging/Effects</p>
                    </div>
                </article>
            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer class="w-full bg-zinc-50 border-t border-zinc-200 py-6 mt-12">
        <div class="max-w-5xl mx-auto px-6 md:px-12 flex flex-col items-center text-center">
            <p class="text-sm text-zinc-400">
                &copy; <span id="year"></span> InkQuisitor. All rights reserved.
            </p>
        </div>
    </footer>

    <!-- Custom Logic -->
    <script src="main.js"></script>
</body>

</html>
